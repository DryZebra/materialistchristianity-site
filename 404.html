<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Materialist Christianity</title>
    <script type="text/javascript">
        // Mirroring Deep Link Support for GitHub Pages
        // This script intercepts 404s (like /essays) and redirects to index.html with a path param.
        
        const path = window.location.pathname;
        const search = window.location.search;
        const hash = window.location.hash;
        
        // Clean the path (remove leading slash)
        const cleanPath = path.startsWith('/') ? path.substring(1) : path;
        
        // Redirect to home with the path as a query param
        if (cleanPath) {
            window.location.replace('/?path=' + encodeURIComponent(cleanPath) + search + hash);
        } else {
            window.location.replace('/');
        }
    </script>
</head>
<body>
    Redirecting to Materialist Christianity Manual...
</body>
</html>
